version: 2
updates:
  # Python dependencies
  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'pdugan20'
    labels:
      - 'dependencies'
      - 'python'
    groups:
      # Group patch and minor updates together
      python-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
        patterns:
          - '*'
      # Major updates get individual PRs
      python-major:
        update-types:
          - 'major'

  # JavaScript dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'pdugan20'
    labels:
      - 'dependencies'
      - 'javascript'
    groups:
      # Group development dependencies
      npm-dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      # Major updates get individual PRs
      npm-major:
        update-types:
          - 'major'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'pdugan20'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      github-actions-updates:
        patterns:
          - '*'
