[pytest]
# Python path
pythonpath = .

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command line options
addopts =
    # Strict configuration
    --strict-markers
    --strict-config

    # Coverage
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml

    # Output
    --verbose
    --tb=short

    # Warnings
    -W error::DeprecationWarning
    -W error::PendingDeprecationWarning

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may hit external services)
    e2e: End-to-end tests (slowest, full system)
    slow: Tests that take >1 second
    requires_api: Tests that require external API access
    requires_browser: Tests that require Playwright/browser

# Coverage settings
[coverage:run]
source = src/
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
skip_covered = False
show_missing = True
exclude_lines =
    # Standard pragma
    pragma: no cover

    # Don't complain about defensive programming
    raise AssertionError
    raise NotImplementedError

    # Don't complain about abstract methods
    @abstractmethod

    # Don't complain if tests don't hit debug code
    def __repr__
    if self\.debug
    if settings\.DEBUG

    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov
